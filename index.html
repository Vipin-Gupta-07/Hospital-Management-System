<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareGrid — Premium Hospital Management System</title>
  <meta name="description" content="State-of-the-art healthcare resource scheduling and electronic health records dashboard.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── LOGIN SCREEN ────────────────────────────────────────── -->
  <div id="login-screen" style="display: none;">
    <div class="login-card">
      <div class="login-logo">
        <span>🏥</span>
        <h2>CareGrid Portal</h2>
        <p class="text-muted text-sm">Please log in to your account</p>
      </div>
      <form onsubmit="App.handleLogin(event)" autocomplete="off">
        <div class="form-group">
          <label for="login-role">Select Portal Role</label>
          <select id="login-role" required>
            <option value="admin">System Administrator</option>
            <option value="doctor">Medical Practitioner / Doctor</option>
            <option value="patient">Registered Patient</option>
          </select>
        </div>
        <div class="form-group">
          <label for="login-user">Username</label>
          <input type="text" id="login-user" required placeholder="e.g. admin">
        </div>
        <div class="form-group">
          <label for="login-pass">Password</label>
          <input type="password" id="login-pass" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Access Account</button>
      </form>
    </div>
  </div>

  <!-- ── MAIN APP SHELL ──────────────────────────────────────── -->
  <div id="app-shell" style="display: none;">
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span>🏥</span>
        <h2>CareGrid</h2>
      </div>
      <ul class="sidebar-menu" id="sidebar-menu">
        <!-- Rendered dynamically by role -->
      </ul>
    </aside>

    <!-- Main Container -->
    <main class="main-container">
      <header>
        <div class="user-profile">
          <div class="avatar" id="header-avatar">H</div>
          <div style="text-align: left;">
            <div class="fw-600 text-sm" id="header-username">Administrator</div>
          </div>
          <button class="btn-icon" onclick="App.handleLogout()" title="Log Out" style="margin-left: 1rem; filter: grayscale(1)">🚪</button>
        </div>
      </header>

      <!-- Dynamic Views -->
      <section class="main-content" id="main-content">
        <!-- Content injected by JS modules -->
      </section>
    </main>
  </div>

  <!-- ── GLOBAL MODAL DIALOG ──────────────────────────────────── -->
  <div id="global-modal" class="modal-overlay">
    <div class="modal-container">
      <div class="modal-header">
        <h3 class="modal-title">Confirm Dialog</h3>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <!-- Forms or description markup -->
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost modal-cancel">Cancel</button>
        <button class="btn btn-primary modal-confirm">Confirm</button>
      </div>
    </div>
  </div>

  <!-- Foundational and Role Modules Scripts -->
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/doctor.js"></script>
  <script src="js/patient.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
